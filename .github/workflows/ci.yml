name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build_test:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Dependencies
        run: npm ci
      - name: Lint and Typecheck
        run: npm run check
      - name: Build Library
        run: npm run build
      - name: Run Tests
        run: npm run test
      - name: Run Smoke Tests
        run: npm run test:smoke
      - name: Build Demo
        run: npm run demo:build

  s3-deploy:
    name: S3 Deploy
    needs: build_test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Dependencies
        run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::612297603577:role/coachmarks
          aws-region: us-east-1
      - uses: concord-consortium/s3-deploy-action@v1
        id: s3-deploy
        with:
          bucket: models-resources
          prefix: coachmarks
          build: npm run deploy:build
          folderToDeploy: dist-s3
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          deployRunUrl: https://models-resources.concord.org/coachmarks/__deployPath__/index.html
          topBranches: |
            ["main"]
